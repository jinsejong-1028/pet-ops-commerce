# Application
spring.application.name=pet-ops-commerce

# Server
server.port=8080

# Datasource
# 환경변수 우선, 없으면 로컬 Docker DB 사용
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petops}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Entity와 테이블 구조 검증
spring.jpa.hibernate.ddl-auto=validate

# 요청 종료 후 영속성 컨텍스트 종료
spring.jpa.open-in-view=false

# SQL 로그 포맷 정렬
spring.jpa.properties.hibernate.format_sql=true

# Flyway
# DB migration 사용
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
# 로컬 개발 기본 secret입니다. 운영 환경에서는 반드시 환경변수 APP_JWT_SECRET으로 교체합니다.
app.jwt.secret=${APP_JWT_SECRET:petops-local-development-secret-key-change-before-production-2026}
# 토큰 발급자를 식별합니다.
app.jwt.issuer=${APP_JWT_ISSUER:pet-ops-commerce}
# access token 만료 시간입니다. 단위는 초입니다.
app.jwt.access-token-expires-in=${APP_JWT_ACCESS_TOKEN_EXPIRES_IN:3600}

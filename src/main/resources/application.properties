# Application
spring.application.name=pet-ops-commerce

# Server
server.port=8080

# Datasource
# 환경변수 우선, 없으면 로컬 Docker DB 사용
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petops}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Entity와 테이블 구조 검증
spring.jpa.hibernate.ddl-auto=validate

# 요청 종료 후 영속성 컨텍스트 종료
spring.jpa.open-in-view=false

# SQL 로그 포맷 정렬
spring.jpa.properties.hibernate.format_sql=true

# Flyway
# DB migration 사용
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration